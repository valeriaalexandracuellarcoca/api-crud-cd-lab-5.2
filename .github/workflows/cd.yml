name: CD - Build, Push and Deploy

# Se dispara en push a main Y en pull requests hacia main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # JOB 1: Build y publicar imagen en Docker Hub
  # ============================================
  build-and-push:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Paso 1: Clonar el código del repositorio
      - name: Checkout del codigo
        uses: actions/checkout@v4

      # Paso 2: Autenticarse en Docker Hub
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Paso 3: Construir y publicar la imagen con dos tags:
      # - El SHA del commit (para rollback preciso)
      # - "latest" (para despliegue del más reciente)
      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mi-app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/mi-app:latest

      # Paso 4: Escaneo de vulnerabilidades con Trivy
      - name: Escaneo de vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/mi-app:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ============================================
  # JOB 2: Desplegar en STAGING
  # Primer entorno — se despliega automáticamente
  # ============================================
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Desplegar en servidor STAGING via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="${{ secrets.DOCKER_USERNAME }}/mi-app:latest"
            
            echo "=== Iniciando despliegue en STAGING ==="
            
            docker pull $IMAGE
            
            docker run -d \
              --name mi-app-new \
              --restart unless-stopped \
              -p 3001:3000 \
              $IMAGE
            
            sleep 5
            
            if curl -sf http://localhost:3001/health; then
              echo ""
              echo "✅ Health check exitoso en STAGING. Activando..."
              
              docker stop mi-app || true
              docker rm mi-app || true
              
              docker run -d \
                --name mi-app \
                --restart unless-stopped \
                -p 80:3000 \
                $IMAGE
              
              docker rm -f mi-app-new || true
              echo "✅ Despliegue en STAGING completado."
            else
              echo ""
              echo "❌ Health check FALLIDO en STAGING."
              docker rm -f mi-app-new || true
              exit 1
            fi
            
            docker system prune -f
            echo "=== STAGING finalizado ==="

  # ============================================
  # JOB 3: Desplegar en PRODUCTION
  # Solo si staging fue exitoso
  # ============================================
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Desplegar en servidor PRODUCTION via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="${{ secrets.DOCKER_USERNAME }}/mi-app:latest"
            
            echo "=== Iniciando despliegue en PRODUCTION ==="
            
            docker pull $IMAGE
            
            docker run -d \
              --name mi-app-new \
              --restart unless-stopped \
              -p 3001:3000 \
              $IMAGE
            
            sleep 5
            
            if curl -sf http://localhost:3001/health; then
              echo ""
              echo "✅ Health check exitoso en PRODUCTION. Activando..."
              
              docker stop mi-app || true
              docker rm mi-app || true
              
              docker run -d \
                --name mi-app \
                --restart unless-stopped \
                -p 80:3000 \
                $IMAGE
              
              docker rm -f mi-app-new || true
              echo "✅ Despliegue en PRODUCTION completado."
            else
              echo ""
              echo "❌ Health check FALLIDO en PRODUCTION."
              docker rm -f mi-app-new || true
              exit 1
            fi
            
            docker system prune -f
            echo "=== PRODUCTION finalizado ==="
